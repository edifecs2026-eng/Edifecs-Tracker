<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Edifecs Tracker</title>
<!--
╔══════════════════════════════════════════════════════════════╗
║           EDIFECS TRACKER — SETUP GUIDE              ║
╠══════════════════════════════════════════════════════════════╣
║                                                              ║
║  STEP 1 — Create your Google Sheet                           ║
║  • Go to sheets.google.com → create a new blank sheet        ║
║  • Name the file "Project Health Tracker"                    ║
║  • The script will auto-create "tickets" and "projects" tabs ║
║                                                              ║
║  STEP 2 — Add the Apps Script                                ║
║  • In your Sheet: Extensions → Apps Script                   ║
║  • Delete any existing code in Code.gs                       ║
║  • Paste the entire contents of Code.gs (the other file)     ║
║  • Save (Ctrl+S)                                             ║
║                                                              ║
║  STEP 3 — Deploy as Web App                                  ║
║  • Click Deploy → New Deployment                             ║
║  • Type: Web App                                             ║
║  • Execute as: Me                                            ║
║  • Who has access: Anyone                                    ║
║  • Click Deploy → Copy the Web App URL                       ║
║                                                              ║
║  STEP 4 — Paste URL below                                    ║
║  • Find the line: const APPS_SCRIPT_URL = ""                 ║
║  • Paste your URL between the quotes                         ║
║                                                              ║
║  STEP 5 — Share links                                        ║
║  • Admin link: yourfile.html?role=admin                      ║
║  • User link:  yourfile.html?role=user                       ║
║  • Host on Google Drive, GitHub Pages, or any static host    ║
║                                                              ║
╚══════════════════════════════════════════════════════════════╝
-->
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F1117;--sidebar:#161B27;--card:#1C2333;--card2:#222A3A;
  --border:#2A3347;--border2:#334060;
  --text:#E2E8F0;--muted:#8892A4;--dim:#4A5568;
  --blue:#3B82F6;--blue-d:#1D4ED8;--blue-l:#93C5FD;
  --green:#10B981;--green-l:#6EE7B7;
  --red:#F43F5E;--red-l:#FCA5A5;
  --amber:#F59E0B;--amber-l:#FCD34D;
  --purple:#8B5CF6;--purple-l:#C4B5FD;
  --teal:#14B8A6;
  --radius:10px;--radius-sm:7px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;display:flex}
#appShell{display:flex;flex:1;flex-direction:row;min-height:100vh;width:100%}
.sidebar{width:220px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-brand{padding:20px 18px 14px;border-bottom:1px solid var(--border)}
.sb-brand .brand-name{font-size:14px;font-weight:700;color:var(--text)}
.sb-brand .brand-role{font-size:10px;margin-top:4px;text-transform:uppercase;letter-spacing:.8px;font-weight:700;padding:2px 8px;border-radius:4px;display:inline-block}
.role-admin{background:rgba(245,158,11,0.15);color:var(--amber-l)}
.role-user{background:rgba(59,130,246,0.15);color:var(--blue-l)}
.sb-section{padding:12px 10px 4px;font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);margin:1px 8px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;transition:all 0.15s;border:none;background:none;width:calc(100% - 16px);text-align:left}
.sb-item:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.sb-item.active{background:rgba(59,130,246,0.15);color:var(--blue-l);border:1px solid rgba(59,130,246,0.25)}
.si-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.main{flex:1;overflow-y:auto;min-width:0}
.main-inner{padding:24px}
/* LOADING */
.loading-bar{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--teal));z-index:9999;animation:loadpulse 1.2s ease-in-out infinite}
@keyframes loadpulse{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}
.offline-banner{background:rgba(244,63,94,0.1);border:1px solid rgba(244,63,94,0.3);border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:12px;color:var(--red-l);display:none}
.setup-banner{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.3);border-radius:10px;padding:16px 18px;margin-bottom:20px}
.setup-banner h3{font-size:13px;font-weight:700;color:var(--amber-l);margin-bottom:8px}
.setup-banner ol{padding-left:18px;color:var(--muted);font-size:12px;line-height:1.9}
.setup-banner code{background:var(--card2);border:1px solid var(--border2);border-radius:4px;padding:1px 6px;font-family:monospace;color:var(--amber-l);font-size:11px}
/* PAGE HEADER */
.page-header{margin-bottom:20px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ph-left h1{font-size:20px;font-weight:600;color:var(--text)}
.ph-left p{color:var(--muted);font-size:12px;margin-top:4px}
/* STATS */
.stat-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;border-left:3px solid}
.stat-box .sn{font-size:24px;font-weight:700;line-height:1}
.stat-box .sl{font-size:11px;color:var(--muted);margin-top:4px}
/* PROJECT CARDS */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.proj-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all 0.2s}
.proj-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.pc-top{height:4px}
.pc-body{padding:16px}
.pc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.pc-name{font-weight:700;font-size:14px;color:var(--text)}
.pc-sub{font-size:11px;color:var(--muted);margin-top:2px}
.pc-owner{font-size:10px;color:var(--dim);margin-top:2px}
.pc-avatar{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.pc-progress{margin-bottom:12px}
.pc-prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px}
.pc-prog-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.pc-prog-fill{height:100%;border-radius:3px;transition:width 0.5s}
.pc-counts{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pc-count{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;display:flex;align-items:center;gap:7px}
.cc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cc-text{font-size:11px;color:var(--muted)}
.cc-n{font-size:13px;font-weight:700;color:var(--text);margin-left:auto}
/* DETAIL */
.detail-topbar{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.dt-name{font-size:17px;font-weight:700;color:var(--text)}
.dt-meta{font-size:11px;color:var(--muted);margin-top:4px;display:flex;gap:12px;flex-wrap:wrap}
.dt-meta span{display:flex;align-items:center;gap:4px}
.dt-actions{display:flex;gap:8px;flex-wrap:wrap}
/* BUTTONS */
.btn{padding:7px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;border:1px solid;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-ghost{background:none;border-color:var(--border2);color:var(--muted)}
.btn-ghost:hover:not(:disabled){border-color:var(--blue);color:var(--blue-l)}
.btn-green{background:rgba(16,185,129,0.12);border-color:rgba(16,185,129,0.35);color:var(--green-l)}
.btn-green:hover:not(:disabled){background:rgba(16,185,129,0.22)}
.btn-blue{background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.35);color:var(--blue-l)}
.btn-blue:hover:not(:disabled){background:rgba(59,130,246,0.22)}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-primary:hover:not(:disabled){background:var(--blue-d)}
/* SECTION BLOCKS */
.sec-block{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
.sec-block-head{padding:13px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.sbh-left{display:flex;align-items:center;gap:10px}
.sbh-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sbh-title{font-weight:700;font-size:13px}
.sbh-count{font-size:11px;background:var(--card2);color:var(--muted);padding:2px 8px;border-radius:20px;border:1px solid var(--border)}
/* TABLE */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:12px;min-width:1000px}
.tbl th{padding:9px 13px;text-align:left;color:var(--dim);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;background:var(--card2);border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:9px 13px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:rgba(255,255,255,0.02)}
.empty-msg{text-align:center;color:var(--dim);padding:28px;font-style:italic;font-size:12px}
/* BADGES */
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.b-open{background:rgba(59,130,246,0.15);color:var(--blue-l);border:1px solid rgba(59,130,246,0.3)}
.b-inprogress{background:rgba(139,92,246,0.15);color:var(--purple-l);border:1px solid rgba(139,92,246,0.3)}
.b-hold{background:rgba(245,158,11,0.15);color:var(--amber-l);border:1px solid rgba(245,158,11,0.3)}
.b-done{background:rgba(16,185,129,0.15);color:var(--green-l);border:1px solid rgba(16,185,129,0.3)}
.b-jira{background:rgba(59,130,246,0.2);color:#93C5FD;border:1px solid rgba(59,130,246,0.35)}
.b-itops{background:rgba(20,184,166,0.2);color:#5EEAD4;border:1px solid rgba(20,184,166,0.35)}
.b-excep{background:rgba(244,63,94,0.2);color:#FCA5A5;border:1px solid rgba(244,63,94,0.35)}
.b-cr-type{background:rgba(139,92,246,0.2);color:#C4B5FD;border:1px solid rgba(139,92,246,0.35)}
.b-yes{background:rgba(16,185,129,0.15);color:var(--green-l);border:1px solid rgba(16,185,129,0.3)}
.b-no{background:var(--card2);color:var(--dim);border:1px solid var(--border)}
.src-imp{background:rgba(245,158,11,0.15);color:var(--amber-l);font-size:9px;padding:1px 5px;border-radius:4px;margin-left:4px;vertical-align:middle}
/* ACTION BUTTONS */
.action-btns{display:flex;gap:5px}
.act-btn{border:1px solid;cursor:pointer;font-size:11px;padding:3px 8px;border-radius:5px;font-weight:600;transition:all 0.15s}
.act-edit{background:rgba(59,130,246,0.1);color:var(--blue-l);border-color:rgba(59,130,246,0.3)}
.act-edit:hover{background:rgba(59,130,246,0.22)}
.act-del{background:rgba(244,63,94,0.1);color:var(--red-l);border-color:rgba(244,63,94,0.3)}
.act-del:hover{background:rgba(244,63,94,0.22)}
/* FILTERS */
.filter-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px}
.filter-grid{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-group label{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.filter-group input,.filter-group select{padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--card2);color:var(--text);font-size:12px;outline:none;transition:border 0.15s}
.filter-group input:focus,.filter-group select:focus{border-color:var(--blue)}
.filter-group select option{background:#1A2236}
.filter-group input{width:160px}
.filter-sep{width:1px;height:36px;background:var(--border2);margin:auto 4px}
.clear-btn{padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:none;color:var(--muted);font-size:11px;cursor:pointer;margin-top:auto}
.clear-btn:hover{border-color:var(--red);color:var(--red-l)}
/* MODAL */
.modal-wrap{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px)}
.modal{background:#1A2236;border:1px solid var(--border2);border-radius:14px;width:94%;max-width:640px;box-shadow:0 24px 64px rgba(0,0,0,0.6);overflow:hidden;max-height:94vh;display:flex;flex-direction:column}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-head h3{font-size:15px;font-weight:700;color:var(--text)}
.modal-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--border2);background:var(--card2);cursor:pointer;color:var(--muted);font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{border-color:var(--red);color:var(--red-l)}
.modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-row.three{grid-template-columns:1fr 1fr 1fr}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.field input,.field select,.field textarea{width:100%;padding:8px 11px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--card2);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border 0.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(59,130,246,0.15)}
.field textarea{min-height:60px;resize:vertical}
.field select option{background:#1A2236}
.modal-foot{padding:13px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;background:#151E30}
/* REGION CHIPS */
.region-chips{display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--card2);min-height:38px}
.rchip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border2);color:var(--muted);transition:all 0.15s;user-select:none}
.rchip.sel{background:rgba(59,130,246,0.2);border-color:rgba(59,130,246,0.4);color:var(--blue-l)}
.rchip:hover:not(.sel){color:var(--text);background:rgba(255,255,255,0.05)}
/* UPLOAD */
.upload-zone{border:2px dashed var(--border2);border-radius:10px;padding:28px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--card2)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--green);background:rgba(16,185,129,0.06)}
.upload-zone input{display:none}
.uz-title{font-size:13px;font-weight:600;color:var(--text);margin:8px 0 4px}
.uz-sub{font-size:11px;color:var(--muted)}
.col-guide{background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.25);border-radius:8px;padding:12px 14px;font-size:11px;color:var(--amber-l)}
.col-guide strong{display:block;margin-bottom:6px;font-size:12px}
.cg-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;color:var(--muted)}
.cg-key{font-weight:700;min-width:85px;color:var(--amber-l)}
.import-summary{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.25);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--green-l)}
.prev-tbl{width:100%;border-collapse:collapse;font-size:11px}
.prev-tbl th{background:var(--card2);padding:6px 10px;text-align:left;color:var(--dim);font-weight:600;border-bottom:1px solid var(--border)}
.prev-tbl td{padding:5px 10px;border-bottom:1px solid var(--border);color:var(--text)}
.prev-tbl tr:last-child td{border-bottom:none}
/* MANAGE */
.manage-tbl{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:#1A2236;border:1px solid var(--border2);color:var(--text);padding:10px 18px;border-radius:9px;font-size:12px;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.toast.show{opacity:1}
/* SPINNER */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.2);border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="appShell">
  <div class="sidebar">
    <div class="sb-brand">
      <div class="brand-name" id="sidebarBrand">Edifecs Tracker</div>
      <div class="brand-role" id="roleLabel"></div>
    </div>
    <div class="sb-section">Main</div>
    <button class="sb-item active" id="nav-dashboard" onclick="navigate('dashboard')">&#9632; Dashboard</button>
    <div id="projNavSection"></div>
    <div id="adminNavSection" style="display:none">
      <div class="sb-section">Admin</div>
      <button class="sb-item" id="nav-manage" onclick="navigate('manage')">&#9864; Manage Projects</button>
    </div>
  </div>

  <div class="main">
    <div class="main-inner">
      <div class="offline-banner" id="offlineBanner">
        &#9888; Could not reach Google Sheets. Showing cached data. Check your Apps Script URL in the HTML file.
      </div>

      <div id="page-dashboard" class="pg">
        <div class="page-header">
          <div class="ph-left"><h1>Dashboard</h1><p id="dashSub">Loading...</p></div>
          <div style="display:flex;gap:8px">
            <input style="padding:7px 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--card2);color:var(--text);font-size:12px;outline:none;width:180px" type="text" id="dashSearch" placeholder="Search project..." oninput="renderDashboard()">
            <button class="btn btn-ghost" onclick="loadData(true)" title="Refresh from Google Sheets">&#8635; Refresh</button>
          </div>
        </div>
        <div class="stat-strip" id="statStrip"></div>
        <div class="proj-grid" id="projGrid"></div>
      </div>

      <div id="page-detail" class="pg" style="display:none">
        <div class="detail-topbar">
          <div>
            <div class="dt-name" id="detName"></div>
            <div class="dt-meta" id="detMeta"></div>
          </div>
          <div class="dt-actions" id="detActions"></div>
        </div>
        <div id="detailBody"></div>
      </div>

      <div id="page-manage" class="pg" style="display:none">
        <div class="page-header">
          <div class="ph-left"><h1>Manage Projects</h1><p>Create or remove projects</p></div>
          <button class="btn btn-primary" onclick="openAddProject()">+ New Project</button>
        </div>
        <div id="manageList"></div>
      </div>
    </div>
  </div>
</div>

<!-- TICKET MODAL -->
<div id="ticketModal" class="modal-wrap" style="display:none">
  <div class="modal">
    <div class="modal-head"><h3 id="ticketModalTitle">Add Ticket</h3><button class="modal-close" onclick="closeM('ticketModal')">&#215;</button></div>
    <div class="modal-body" id="ticketModalBody"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeM('ticketModal')">Cancel</button>
      <button class="btn btn-primary" id="saveTicketBtn" onclick="saveTicket()">Save Ticket</button>
    </div>
  </div>
</div>

<!-- UPLOAD MODAL -->
<div id="uploadModal" class="modal-wrap" style="display:none">
  <div class="modal" style="max-width:600px">
    <div class="modal-head"><h3>&#8679; Upload Excel — <span id="uploadProjName"></span></h3><button class="modal-close" onclick="closeM('uploadModal')">&#215;</button></div>
    <div class="modal-body" id="uploadBody"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeM('uploadModal')">Cancel</button>
      <button class="btn btn-green" id="importBtn" style="display:none" onclick="confirmImport()">Import Data</button>
    </div>
  </div>
</div>

<!-- ADD PROJECT MODAL -->
<div id="projModal" class="modal-wrap" style="display:none">
  <div class="modal" style="max-width:460px">
    <div class="modal-head"><h3>New Project</h3><button class="modal-close" onclick="closeM('projModal')">&#215;</button></div>
    <div class="modal-body">
      <div class="field"><label>Project Name *</label><input id="np-name" placeholder="e.g. Team Alpha"></div>
      <div class="field"><label>Interface / App</label><input id="np-iface" placeholder="e.g. Claims Processing (837)"></div>
      <div class="field"><label>Owner / Team Lead</label><input id="np-owner" placeholder="Name of team lead"></div>
    </div>

      <button class="btn btn-ghost" onclick="closeM('projModal')">Cancel</button>
      <button class="btn btn-primary" id="saveProjBtn" onclick="saveNewProject()">Create Project</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ════════════════════════════════════════════════════════
//  ▶  PASTE YOUR APPS SCRIPT WEB APP URL BELOW
// ════════════════════════════════════════════════════════
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx8DkqGoCNTgbHhT0h8PUnAwSWHb4_x3p5dRuwRkysuLcjjkA98xltbpK5cjVDIwMCKcA/exec";
// ════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════
//  ▶  CHANGE APP NAME HERE — updates title, sidebar, dashboard
//     APP_SHORT_NAME appears in the sidebar (keep it short)
//     APP_NAME appears in browser tab and dashboard heading
// ════════════════════════════════════════════════════════
const APP_NAME       = "Edifecs Tracker";
const APP_SHORT_NAME = "Edifecs Tracker";
// ════════════════════════════════════════════════════════

const REGIONS = ["PROD","UAT","SIT","DEV"];
const TICKET_TYPES = ["JIRA","ITOPS","Exception","CR"];
const STATUSES = [{v:"open",l:"Open"},{v:"inprogress",l:"In Progress"},{v:"hold",l:"On Hold"},{v:"completed",l:"Completed"}];
const COLORS = ["#3B82F6","#10B981","#F59E0B","#8B5CF6","#F43F5E"];
const AVBG = ["rgba(59,130,246,0.18)","rgba(16,185,129,0.18)","rgba(245,158,11,0.18)","rgba(139,92,246,0.18)","rgba(244,63,94,0.18)"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

const params = new URLSearchParams(window.location.search);
let currentRole = params.get("role") || "admin";
if (!["admin","user"].includes(currentRole)) currentRole = "user";

let projects = [];
let currentPage = "dashboard", currentProj = null, ticketState = {}, parsedImport = [];
let isLoading = false;

// ── HELPERS ──────────────────────────────────────────────
function today(){ return new Date().toISOString().slice(0,10); }
function uid(){ return Math.random().toString(36).slice(2,8).toUpperCase(); }
function nk(k){ return String(k).toLowerCase().replace(/[\s_\-]+/g,""); }
function getProj(id){ return projects.find(p=>p.id===id); }

function projStats(p){
  const t = p.tickets||[];
  return {
    open: t.filter(x=>x.status!=="completed").length,
    done: t.filter(x=>x.status==="completed").length,
    total: t.length,
    jira:  t.filter(x=>x.type==="JIRA"&&x.status!=="completed").length,
    itops: t.filter(x=>x.type==="ITOPS"&&x.status!=="completed").length,
    exc:   t.filter(x=>x.type==="Exception"&&x.status!=="completed").length,
    cr:    t.filter(x=>x.type==="CR"&&x.status!=="completed").length,
  };
}

function statusBadge(s){
  const m={open:"b-open",inprogress:"b-inprogress",hold:"b-hold",completed:"b-done"};
  const l={open:"Open",inprogress:"In Progress",hold:"On Hold",completed:"Completed"};
  return `<span class="badge ${m[s]||"b-open"}">${l[s]||s}</span>`;
}
function typeBadge(t){
  const m={JIRA:"b-jira",ITOPS:"b-itops",Exception:"b-excep",CR:"b-cr-type"};
  return `<span class="badge ${m[t]||"b-jira"}">${t}</span>`;
}

function showToast(msg, col){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.borderColor = col||"#334060";
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2600);
}
function showLoading(on){
  let bar = document.getElementById("loadBar");
  if(on && !bar){ bar=document.createElement("div"); bar.id="loadBar"; bar.className="loading-bar"; document.body.appendChild(bar); }
  else if(!on && bar) bar.remove();
}

function getYears(){
  const ys = new Set();
  projects.forEach(p=>(p.tickets||[]).forEach(t=>{ if(t.created) ys.add(t.created.slice(0,4)); }));
  return [...ys].sort().reverse();
}

// ── API CALLS ─────────────────────────────────────────────
const isConfigured = ()=> APPS_SCRIPT_URL && APPS_SCRIPT_URL.length > 10;

async function apiGet(params){
  if(!isConfigured()) return null;
  try{
    const url = APPS_SCRIPT_URL + "?" + new URLSearchParams(params);
    const res = await fetch(url);
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    return data;
  } catch(e){ console.error("API GET error:", e); return null; }
}

async function apiPost(body){
  if(!isConfigured()) return null;
  try{
    const res = await fetch(APPS_SCRIPT_URL, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify(body), mode:"cors"
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    return data;
  } catch(e){ console.error("API POST error:", e); return null; }
}

// ── LOAD DATA ─────────────────────────────────────────────
async function loadData(force){
  showLoading(true);
  const cached = localStorage.getItem("pht_data");
  if(cached && !force){
    try{ projects = JSON.parse(cached); }catch(e){}
  }
  if(isConfigured()){
    const data = await apiGet({action:"getAll"});
    if(data && data.projects){
      projects = data.projects;
      localStorage.setItem("pht_data", JSON.stringify(projects));
      document.getElementById("offlineBanner").style.display="none";
    } else {
      document.getElementById("offlineBanner").style.display="block";
      if(!cached) projects = getSeedData();
    }
  } else {
    document.getElementById("offlineBanner").style.display = "block";
    if(!cached) projects = getSeedData();
  }
  showLoading(false);
  buildProjNav();
  if(currentPage==="dashboard") renderDashboard();
  else if(currentPage==="detail" && currentProj) renderDetail(currentProj);
  else if(currentPage==="manage") renderManage();
}

function getSeedData(){
  const names=[
    {name:"Team Alpha",iface:"Claims Processing (837)",ownerName:"Rajan M",color:"#3B82F6"},
    {name:"Team Beta",iface:"Member Enrollment (834)",ownerName:"Sneha K",color:"#10B981"},
    {name:"Team Gamma",iface:"Payment Remittance (835)",ownerName:"Arjun V",color:"#F59E0B"},
    {name:"Team Delta",iface:"Provider Directory",ownerName:"Priya R",color:"#8B5CF6"},
    {name:"Team Epsilon",iface:"Eligibility Checker",ownerName:"Amal S",color:"#F43F5E"},
  ];
  const dates=["2024-03-12","2024-07-05","2024-11-18","2025-01-22","2025-04-10","2025-04-17"];
  const sts=["open","inprogress","hold","completed","open","inprogress"];
  const tys=["JIRA","ITOPS","Exception","CR","JIRA","ITOPS"];
  return names.map((n,pi)=>{
    const id="P"+(pi+1);
    const tickets=[];
    for(let i=0;i<6;i++){
      tickets.push({
        projectId:id, si:i+1, created:dates[(pi+i)%6],
        ticketNo:`TKT-${id}-${String(i+1).padStart(3,"0")}`,
        type:tys[(pi+i)%6], isCR:i%3===0,
        description:`Sample issue ${i+1} for ${n.name}`,
        owner:n.ownerName, psd:i%2===0?"PSD-"+uid():"NO",
        interface:n.iface,
        handedTo:i%4===0?names[(pi+1)%5].name:"",
        status:sts[(pi+i)%6],
        regions:i%2===0?["PROD","UAT"]:["SIT"],
        remarks:"", _src:"manual"
      });
    }
    return {id, ...n, tickets};
  });
}

// ── NAVIGATION ────────────────────────────────────────────
function init(){
  document.getElementById("pageTitle").textContent    = APP_NAME;
  document.getElementById("sidebarBrand").textContent = APP_SHORT_NAME;
  const label = document.getElementById("roleLabel");
  label.textContent = currentRole==="admin"?"Admin":"User";
  label.className = "brand-role "+(currentRole==="admin"?"role-admin":"role-user");
  document.getElementById("adminNavSection").style.display = currentRole==="admin"?"block":"none";
  loadData(false);
}

function buildProjNav(){
  document.getElementById("projNavSection").innerHTML =
    '<div class="sb-section">Projects</div>' +
    projects.map(p=>`<button class="sb-item" id="nav-proj-${p.id}" onclick="navigate('detail','${p.id}')">
      <span class="si-dot" style="background:${p.color}"></span>${p.name}
    </button>`).join("");
}

function navigate(page, pid){
  document.querySelectorAll(".pg").forEach(x=>x.style.display="none");
  document.querySelectorAll(".sb-item").forEach(x=>x.classList.remove("active"));
  if(page==="dashboard"){
    document.getElementById("page-dashboard").style.display="block";
    document.getElementById("nav-dashboard").classList.add("active");
    renderDashboard();
  } else if(page==="detail"){
    currentProj = pid;
    document.getElementById("page-detail").style.display="block";
    const nb = document.getElementById("nav-proj-"+pid);
    if(nb) nb.classList.add("active");
    renderDetail(pid);
  } else if(page==="manage"){
    document.getElementById("page-manage").style.display="block";
    const nm = document.getElementById("nav-manage");
    if(nm) nm.classList.add("active");
    renderManage();
  }
  currentPage = page;
}

function closeM(id){ document.getElementById(id).style.display="none"; }
["ticketModal","uploadModal","projModal"].forEach(id=>{
  document.getElementById(id).addEventListener("click", e=>{
    if(e.target===document.getElementById(id)) closeM(id);
  });
});

// ── DASHBOARD ─────────────────────────────────────────────
function renderDashboard(){
  const search = (document.getElementById("dashSearch")||{value:""}).value.toLowerCase();
  let allO=0,allD=0,allT=0;
  projects.forEach(p=>{ const s=projStats(p); allO+=s.open; allD+=s.done; allT+=s.total; });
  document.getElementById("dashSub").textContent = `${projects.length} active projects · ${allT} total tickets`;
  document.getElementById("statStrip").innerHTML=[
    {n:projects.length,l:"Projects",c:"#3B82F6"},
    {n:allT,l:"Total Tickets",c:"#14B8A6"},
    {n:allO,l:"Open / Active",c:"#F43F5E"},
    {n:allD,l:"Completed",c:"#10B981"},
  ].map(s=>`<div class="stat-box" style="border-color:${s.c}"><div class="sn" style="color:${s.c}">${s.n}</div><div class="sl">${s.l}</div></div>`).join("");

  const filtered = projects.filter(p=>!search||(p.name+p.iface+p.ownerName).toLowerCase().includes(search));

  if(!isConfigured()){
    const setupHtml=`<div class="setup-banner">
      <h3>&#9888; Setup Required — Paste your Apps Script URL</h3>
      <ol>
        <li>Go to <strong>sheets.google.com</strong> → create a new spreadsheet</li>
        <li>Click <strong>Extensions → Apps Script</strong> → paste the <code>Code.gs</code> file contents</li>
        <li>Click <strong>Deploy → New Deployment → Web App</strong> (Execute as: Me, Access: Anyone)</li>
        <li>Copy the Web App URL and paste it into this HTML file where it says <code>const APPS_SCRIPT_URL = ""</code></li>
        <li>Share <code>yourfile.html?role=admin</code> with admins and <code>yourfile.html?role=user</code> with users</li>
      </ol>
    </div>`;
    document.getElementById("projGrid").innerHTML = setupHtml + filtered.map((p,i)=>projCardHtml(p,i)).join("");
  } else {
    document.getElementById("projGrid").innerHTML = filtered.map((p,i)=>projCardHtml(p,i)).join("");
  }
}

function projCardHtml(p, i){
  const s=projStats(p); const pct=s.total?Math.round(s.done/s.total*100):0;
  return`<div class="proj-card" onclick="navigate('detail','${p.id}')">
    <div class="pc-top" style="background:${p.color}"></div>
    <div class="pc-body">
      <div class="pc-head">
        <div>
          <div class="pc-name">${p.name}</div>
          <div class="pc-sub">${p.iface||"—"}</div>
          <div class="pc-owner">&#128100; ${p.ownerName||"—"}</div>
        </div>
        <div class="pc-avatar" style="background:${AVBG[i%5]};color:${p.color}">${(p.name||"?")[0]}</div>
      </div>
      <div class="pc-progress">
        <div class="pc-prog-label"><span>${pct}% complete</span><span>${s.done}/${s.total}</span></div>
        <div class="pc-prog-bar"><div class="pc-prog-fill" style="width:${pct}%;background:${p.color}"></div></div>
      </div>
      <div class="pc-counts">
        <div class="pc-count"><span class="cc-dot" style="background:#3B82F6"></span><span class="cc-text">JIRA</span><span class="cc-n">${s.jira}</span></div>
        <div class="pc-count"><span class="cc-dot" style="background:#14B8A6"></span><span class="cc-text">ITOPS</span><span class="cc-n">${s.itops}</span></div>
        <div class="pc-count"><span class="cc-dot" style="background:#F43F5E"></span><span class="cc-text">Exception</span><span class="cc-n">${s.exc}</span></div>
        <div class="pc-count"><span class="cc-dot" style="background:#8B5CF6"></span><span class="cc-text">CR</span><span class="cc-n">${s.cr}</span></div>
      </div>
    </div>
  </div>`;
}

// ── DETAIL PAGE ───────────────────────────────────────────
function renderDetail(pid){
  const p = getProj(pid); if(!p) return;
  const isAdmin = currentRole==="admin";
  document.getElementById("detName").textContent = p.name;
  document.getElementById("detMeta").innerHTML =
    `<span>&#127760; ${p.iface||"—"}</span>
     <span>&#128100; ${p.ownerName||"—"}</span>
     <span style="color:var(--muted)">${(p.tickets||[]).length} tickets total</span>`;
  document.getElementById("detActions").innerHTML =
    (isAdmin?`<button class="btn btn-green" onclick="openUpload('${pid}')">&#8679; Upload Excel</button>
     <button class="btn btn-blue" onclick="openTicket('add','${pid}')">+ Add Ticket</button>`:"")
    +`<button class="btn btn-ghost" onclick="navigate('dashboard')">&#8592; Back</button>`;

  const s=projStats(p); const pct=(p.tickets||[]).length?Math.round(s.done/(p.tickets||[]).length*100):0;
  const years=getYears();

  const summaryHtml=`
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px">
      ${[{l:"Open JIRA",n:s.jira,c:"#3B82F6"},{l:"Open ITOPS",n:s.itops,c:"#14B8A6"},{l:"Open Exceptions",n:s.exc,c:"#F43F5E"},{l:"Open CR",n:s.cr,c:"#8B5CF6"}]
      .map(x=>`<div class="stat-box" style="border-color:${x.c};padding:10px 14px"><div class="sn" style="color:${x.c};font-size:20px">${x.n}</div><div class="sl">${x.l}</div></div>`).join("")}
    </div>
    <div class="stat-box" style="border-color:${p.color};margin-bottom:16px;padding:12px 16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:12px;color:var(--muted)">Overall progress</span>
        <span style="font-size:12px;color:var(--muted)">${s.done} of ${(p.tickets||[]).length} completed (${pct}%)</span>
      </div>
      <div class="pc-prog-bar" style="height:7px"><div class="pc-prog-fill" style="width:${pct}%;background:${p.color}"></div></div>
    </div>`;

  const yearOpts = `<option value="">All years</option>`+years.map(y=>`<option value="${y}">${y}</option>`).join("");
  const monthOpts = `<option value="">All months</option>`+MONTHS.map((m,i)=>`<option value="${String(i+1).padStart(2,"0")}">${m}</option>`).join("");

  const filterHtml=`<div class="filter-wrap">
    <div class="filter-grid">
      <div class="filter-group"><label>Search</label><input type="text" id="tf-search" placeholder="Ticket no, description..." oninput="applyFilters('${pid}')"></div>
      <div class="filter-group"><label>Type</label>
        <select id="tf-type" onchange="applyFilters('${pid}')">
          <option value="">All</option>${TICKET_TYPES.map(t=>`<option value="${t}">${t}</option>`).join("")}
        </select>
      </div>
      <div class="filter-group"><label>Status</label>
        <select id="tf-status" onchange="applyFilters('${pid}')">
          <option value="">All</option>${STATUSES.map(s=>`<option value="${s.v}">${s.l}</option>`).join("")}
        </select>
      </div>
      <div class="filter-group"><label>Region</label>
        <select id="tf-region" onchange="applyFilters('${pid}')">
          <option value="">All</option>${REGIONS.map(r=>`<option value="${r}">${r}</option>`).join("")}
        </select>
      </div>
      <div class="filter-sep"></div>
      <div class="filter-group"><label>Year</label>
        <select id="tf-year" onchange="applyFilters('${pid}')" style="width:90px">${yearOpts}</select>
      </div>
      <div class="filter-group"><label>Month</label>
        <select id="tf-month" onchange="applyFilters('${pid}')" style="width:100px">${monthOpts}</select>
      </div>
      <button class="clear-btn" onclick="clearFilters('${pid}')">&#215; Clear</button>
    </div>
  </div>`;

  document.getElementById("detailBody").innerHTML = summaryHtml + filterHtml + `<div id="ticketTableWrap"></div>`;
  applyFilters(pid);
}

function applyFilters(pid){
  const p=getProj(pid); if(!p) return;
  const g = id=>(document.getElementById(id)||{value:""}).value;
  const search=g("tf-search").toLowerCase(), type=g("tf-type"),
        status=g("tf-status"), region=g("tf-region"),
        year=g("tf-year"), month=g("tf-month");
  let rows=(p.tickets||[]);
  if(search) rows=rows.filter(t=>(t.ticketNo+t.description+t.psd+t.owner+t.interface).toLowerCase().includes(search));
  if(type)   rows=rows.filter(t=>t.type===type);
  if(status) rows=rows.filter(t=>t.status===status);
  if(region) rows=rows.filter(t=>(t.regions||[]).includes(region));
  if(year)   rows=rows.filter(t=>t.created&&t.created.startsWith(year));
  if(month)  rows=rows.filter(t=>t.created&&t.created.slice(5,7)===month);
  document.getElementById("ticketTableWrap").innerHTML = buildTicketTable(p, rows, currentRole==="admin");
}

function clearFilters(pid){
  ["tf-search","tf-type","tf-status","tf-region","tf-year","tf-month"].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value="";
  });
  applyFilters(pid);
}

function buildTicketTable(p, rows, isAdmin){
  if(!rows.length) return`<div class="sec-block"><div class="empty-msg">No tickets match the current filters.</div></div>`;
  return`<div class="sec-block">
    <div class="sec-block-head">
      <div class="sbh-left">
        <div class="sbh-dot" style="background:${p.color}"></div>
        <span class="sbh-title" style="color:${p.color}">Tickets</span>
        <span class="sbh-count">${rows.length} ${rows.length===1?"entry":"entries"}</span>
      </div>
    </div>
    <div class="tbl-wrap"><table class="tbl">
      <thead><tr>
        <th>SI</th><th>Created</th><th>Ticket No</th><th>Type</th><th>CR?</th>
        <th>Description</th><th>Owner</th><th>PSD No</th><th>Interface</th>
        <th>Handed To</th><th>Status</th><th>Regions</th><th>Remarks</th>
        ${isAdmin?"<th>Actions</th>":""}
      </tr></thead>
      <tbody>${rows.map(t=>`<tr>
        <td style="color:var(--dim)">${t.si}</td>
        <td style="color:var(--muted);white-space:nowrap">${t.created||"—"}</td>
        <td><strong>${t.ticketNo}</strong>${t._src==="import"?'<span class="src-imp">imported</span>':""}</td>
        <td>${typeBadge(t.type)}</td>
        <td><span class="badge ${t.isCR?"b-yes":"b-no"}">${t.isCR?"Yes":"No"}</span></td>
        <td style="max-width:180px;word-break:break-word">${t.description}</td>
        <td style="color:var(--blue-l);white-space:nowrap">${t.owner||"—"}</td>
        <td style="white-space:nowrap"><span class="badge ${t.psd&&t.psd!=="NO"?"b-jira":"b-no"}">${t.psd||"NO"}</span></td>
        <td style="color:var(--muted);white-space:nowrap">${t.interface||"—"}</td>
        <td style="color:${t.handedTo?"var(--amber-l)":"var(--dim)"};white-space:nowrap">${t.handedTo||"—"}</td>
        <td>${statusBadge(t.status)}</td>
        <td style="white-space:nowrap">${(t.regions||[]).map(r=>`<span class="badge b-no" style="margin:1px 2px">${r}</span>`).join("")||"—"}</td>
        <td style="max-width:130px;color:var(--muted);word-break:break-word">${t.remarks||"—"}</td>
        ${isAdmin?`<td><div class="action-btns">
          <button class="act-btn act-edit" onclick="openTicket('edit','${p.id}','${t.ticketNo}')">Edit</button>
          <button class="act-btn act-del" onclick="deleteTicket('${p.id}','${t.ticketNo}')">Del</button>
        </div></td>`:""}
      </tr>`).join("")}</tbody>
    </table></div>
  </div>`;
}

// ── TICKET MODAL ──────────────────────────────────────────
function openTicket(mode, pid, ticketNoOrRi){
  const p=getProj(pid);
  const isEdit=mode==="edit";
  const e=isEdit?p.tickets.find(t=>t.ticketNo===ticketNoOrRi)||{}:{};
  ticketState={mode,pid,origTicketNo:e.ticketNo};

  const stOpts=STATUSES.map(s=>`<option value="${s.v}"${(e.status||"open")===s.v?" selected":""}>${s.l}</option>`).join("");
  const tyOpts=TICKET_TYPES.map(t=>`<option value="${t}"${e.type===t?" selected":""}>${t}</option>`).join("");
  const selR=e.regions||[];
  const projOpts=`<option value="">— None —</option>`+projects.map(pr=>`<option value="${pr.name}"${e.handedTo===pr.name?" selected":""}>${pr.name}</option>`).join("");

  document.getElementById("ticketModalTitle").textContent=isEdit?`Edit — ${e.ticketNo}`:`Add Ticket — ${p.name}`;
  document.getElementById("ticketModalBody").innerHTML=`
    <div class="field-row">
      <div class="field"><label>Ticket Number *</label><input id="t-no" value="${e.ticketNo||""}" placeholder="e.g. JIRA-001"></div>
      <div class="field"><label>Created Date</label><input id="t-date" type="date" value="${e.created||today()}"></div>
    </div>
    <div class="field-row three">
      <div class="field"><label>Type</label><select id="t-type">${tyOpts}</select></div>
      <div class="field"><label>Is this a CR?</label><select id="t-cr">
        <option value="false"${!e.isCR?" selected":""}>No</option>
        <option value="true"${e.isCR?" selected":""}>Yes</option>
      </select></div>
      <div class="field"><label>Status</label><select id="t-status">${stOpts}</select></div>
    </div>
    <div class="field"><label>Description *</label><textarea id="t-desc" placeholder="Describe the issue or change request...">${e.description||""}</textarea></div>
    <div class="field-row">
      <div class="field"><label>Owner (Resource Name)</label><input id="t-owner" value="${e.owner||""}" placeholder="Who is working on this?"></div>
      <div class="field"><label>PSD Ticket Number</label><input id="t-psd" value="${e.psd||""}" placeholder="PSD-XXXX or NO"></div>
    </div>
    <div class="field">
      <label>Interface</label>
      <input id="t-interface" value="${e.interface||p.iface||""}" placeholder="Which interface is this ticket based on?">
    </div>
    <div class="field-row">
      <div class="field"><label>Handed to Team</label><select id="t-handed">${projOpts}</select></div>
      <div class="field"><label>Deployed Regions</label>
        <div class="region-chips">${REGIONS.map(r=>`<span class="rchip${selR.includes(r)?" sel":""}" onclick="this.classList.toggle('sel')">${r}</span>`).join("")}</div>
      </div>
    </div>
    <div class="field"><label>Remarks / Comments</label><textarea id="t-remarks" placeholder="Additional notes...">${e.remarks||""}</textarea></div>`;
  document.getElementById("ticketModal").style.display="flex";
}

async function saveTicket(){
  const {mode,pid,origTicketNo}=ticketState;
  const p=getProj(pid);
  const no=document.getElementById("t-no").value.trim();
  const desc=document.getElementById("t-desc").value.trim();
  if(!no){document.getElementById("t-no").style.borderColor="var(--red)";return;}
  if(!desc){document.getElementById("t-desc").style.borderColor="var(--red)";return;}

  const selR=[...document.querySelectorAll("#ticketModal .rchip.sel")].map(c=>c.textContent);
  const ticket={
    ticketNo:no, created:document.getElementById("t-date").value,
    type:document.getElementById("t-type").value,
    isCR:document.getElementById("t-cr").value==="true",
    description:desc,
    owner:document.getElementById("t-owner").value.trim(),
    psd:document.getElementById("t-psd").value.trim()||"NO",
    interface:document.getElementById("t-interface").value.trim(),
    handedTo:document.getElementById("t-handed").value,
    status:document.getElementById("t-status").value,
    regions:selR,
    remarks:document.getElementById("t-remarks").value.trim(),
    _src:"manual"
  };

  const btn=document.getElementById("saveTicketBtn");
  btn.disabled=true; btn.innerHTML=`<span class="spinner"></span> Saving...`;

  if(isConfigured()){
    let res;
    if(mode==="add")  res=await apiPost({action:"addTicket",projectId:pid,ticket});
    else              res=await apiPost({action:"updateTicket",projectId:pid,ticketNo:origTicketNo,ticket});
    if(!res||!res.success){
      showToast("Save failed — check connection","#F43F5E");
      btn.disabled=false; btn.textContent="Save Ticket"; return;
    }
    await loadData(true);
  } else {
    // Local only
    const existing=mode==="edit"?p.tickets.find(t=>t.ticketNo===origTicketNo):null;
    if(mode==="add"){ticket.si=p.tickets.length+1; p.tickets.push(ticket);}
    else if(existing){ Object.assign(existing,ticket); }
    localStorage.setItem("pht_data",JSON.stringify(projects));
    buildProjNav(); renderDetail(pid);
  }

  closeM("ticketModal");
  btn.disabled=false; btn.textContent="Save Ticket";
  showToast(mode==="add"?"Ticket added":"Ticket updated","#3B82F6");
}

async function deleteTicket(pid, ticketNo){
  if(!confirm("Delete this ticket? This cannot be undone.")) return;
  if(isConfigured()){
    const res=await apiPost({action:"deleteTicket",projectId:pid,ticketNo});
    if(!res||!res.success){showToast("Delete failed","#F43F5E");return;}
    await loadData(true);
  } else {
    const p=getProj(pid);
    p.tickets=p.tickets.filter(t=>t.ticketNo!==ticketNo);
    p.tickets.forEach((t,i)=>t.si=i+1);
    localStorage.setItem("pht_data",JSON.stringify(projects));
    buildProjNav(); renderDetail(pid);
  }
  showToast("Ticket deleted","#F43F5E");
}

  document.getElementById("uploadModal").style.display="flex";

function handleDrop(e,pid){e.preventDefault();document.getElementById("dropZone").classList.remove("drag");processXL(e.dataTransfer.files[0],pid);}
function handleFileSelect(e,pid){processXL(e.target.files[0],pid);}

function processXL(file,pid){
  document.getElementById("parseStatus").textContent="Reading file...";
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:"array"});
      const sn=wb.SheetNames.find(s=>s.toLowerCase().replace(/\s/g,"").includes("ticket"))||wb.SheetNames[0];
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:""});
      if(!rows.length){document.getElementById("parseStatus").textContent="No data found in sheet.";return;}
      const p=getProj(pid);
      const existing=new Set((p.tickets||[]).map(t=>t.ticketNo));
      const stMap={"open":"open","in progress":"inprogress","inprogress":"inprogress","in-progress":"inprogress","hold":"hold","on hold":"hold","completed":"completed","done":"completed"};
      parsedImport=rows.map((row,i)=>{
        const nr={};Object.keys(row).forEach(k=>nr[nk(k)]=row[k]);
        const rg=String(nr.regions||"").split(",").map(r=>r.trim().toUpperCase()).filter(r=>REGIONS.includes(r));
        const tno=String(nr.ticketno||nr.ticket_no||`IMP-${uid()}`).trim();
        return{
          _src:"import", si:(p.tickets||[]).length+i+1,
          ticketNo:tno, created:String(nr.created||today()).trim(),
          type:TICKET_TYPES.includes(String(nr.type||"").trim())?String(nr.type).trim():"JIRA",
          isCR:String(nr.iscr||nr.is_cr||"no").toLowerCase()==="yes",
          description:String(nr.description||"").trim()||"(no description)",
          owner:String(nr.owner||"").trim(),
          psd:String(nr.psd||"NO").trim(),
          interface:String(nr.interface||"").trim(),
          handedTo:String(nr.handedto||nr.handed_to||"").trim(),
          status:stMap[String(nr.status||"").toLowerCase().trim()]||"open",
          regions:rg, remarks:String(nr.remarks||"").trim(),
          _dup:existing.has(tno)
        };
      });
      const newOnes=parsedImport.filter(r=>!r._dup), dups=parsedImport.filter(r=>r._dup);
      document.getElementById("parseStatus").textContent="";
      document.getElementById("importBtn").style.display="inline-flex";
      document.getElementById("previewArea").innerHTML=`
        <div class="import-summary" style="margin-top:10px"><strong>Ready to import ${newOnes.length} ticket${newOnes.length!==1?"s":""}</strong>${dups.length?` · ${dups.length} duplicate(s) will be skipped`:""}</div>
        ${newOnes.length?`<div style="overflow-x:auto;margin-top:10px"><table class="prev-tbl">
          <thead><tr><th>Ticket No</th><th>Date</th><th>Type</th><th>Owner</th><th>PSD</th><th>Status</th></tr></thead>
          <tbody>${newOnes.slice(0,6).map(r=>`<tr>
            <td>${r.ticketNo}</td><td>${r.created}</td><td>${typeBadge(r.type)}</td>
            <td>${r.owner||"—"}</td><td>${r.psd||"NO"}</td><td>${statusBadge(r.status)}</td>
          </tr>`).join("")}</tbody>
        </table>${newOnes.length>6?`<div style="font-size:11px;color:var(--muted);padding:6px 10px">...and ${newOnes.length-6} more rows</div>`:""}</div>`:""}`;
    }catch(err){document.getElementById("parseStatus").textContent="Error: "+err.message;}
  };
  reader.readAsArrayBuffer(file);
}

async function confirmImport(){
  const pid=ticketState._uploadPid; const p=getProj(pid);
  const newOnes=parsedImport.filter(r=>!r._dup);
  const btn=document.getElementById("importBtn");
  btn.disabled=true; btn.innerHTML=`<span class="spinner"></span> Importing...`;

  if(isConfigured()){
    for(const t of newOnes){
      delete t._dup;
      await apiPost({action:"addTicket",projectId:pid,ticket:t});
    }
    await loadData(true);
  } else {
    newOnes.forEach((r,i)=>{r.si=(p.tickets||[]).length+i+1;delete r._dup;(p.tickets=p.tickets||[]).push(r);});
    localStorage.setItem("pht_data",JSON.stringify(projects));
    buildProjNav(); renderDetail(pid);
  }

  closeM("uploadModal");
  btn.disabled=false; btn.innerHTML="Import Data";
  showToast(`Imported ${newOnes.length} tickets`,"#10B981");
}

      <td><span style="display:inline-flex;align-items:center;gap:8px">
        <span style="width:10px;height:10px;border-radius:50%;background:${p.color};display:inline-block"></span>
        <strong style="color:${p.color}">${p.name}</strong></span></td>

function openAddProject(){ document.getElementById("projModal").style.display="flex"; }

async function saveNewProject(){
  const name=document.getElementById("np-name").value.trim();
  if(!name){document.getElementById("np-name").style.borderColor="var(--red)";return;}
  const proj={name,iface:document.getElementById("np-iface").value.trim()||"—",ownerName:document.getElementById("np-owner").value.trim()||"—",color:COLORS[projects.length%COLORS.length]};
  const btn=document.getElementById("saveProjBtn");
  btn.disabled=true; btn.innerHTML=`<span class="spinner"></span> Creating...`;

  if(isConfigured()){
    const res=await apiPost({action:"addProject",project:proj});
    if(res&&res.success) await loadData(true);
    else showToast("Failed to create project","#F43F5E");
  } else {
    proj.id="P"+Date.now(); proj.tickets=[];
    projects.push(proj);
    localStorage.setItem("pht_data",JSON.stringify(projects));
    buildProjNav(); renderManage();
  }

  closeM("projModal");
  btn.disabled=false; btn.textContent="Create Project";
  showToast("Project created","#10B981");
}

async function deleteProject(id){
  if(!confirm("Delete this project and ALL its tickets? This cannot be undone.")) return;
  if(isConfigured()){
    const res=await apiPost({action:"deleteProject",projectId:id});
    if(res&&res.success) await loadData(true);
    else {showToast("Delete failed","#F43F5E");return;}
  } else {
    projects=projects.filter(p=>p.id!==id);
    localStorage.setItem("pht_data",JSON.stringify(projects));
    buildProjNav(); renderManage();
  }
  showToast("Project deleted","#F43F5E");
}
